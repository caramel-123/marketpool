<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>
  <!-- Coin ripple circles -->
  <circle cx="256" cy="276" r="110" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="8"/>
  <circle cx="256" cy="276" r="80" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="6"/>
  <!-- Center coin -->
  <circle cx="256" cy="276" r="60" fill="rgba(255,255,255,0.9)"/>
  <circle cx="256" cy="276" r="48" fill="#F59E0B"/>
  <text x="256" y="295" text-anchor="middle" font-size="44" font-weight="bold" fill="white" font-family="sans-serif">₱</text>
  <!-- MP lettering at top -->
  <text x="256" y="160" text-anchor="middle" font-size="72" font-weight="800" fill="white" font-family="Poppins, sans-serif" opacity="0.95">MP</text>
</svg>
